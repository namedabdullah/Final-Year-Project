# Alembic config for the SAMpai app database.
# Run from the repo root with the venv, e.g.:
#   .venv/Scripts/python.exe -m alembic -c lightrag/api/sampai/alembic.ini upgrade head
# The DB URL is read from SampaiSettings (APP_DATABASE_URL) in env.py, not here.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
