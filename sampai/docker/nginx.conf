# SAMpai web edge: serve the SPA at /, proxy the API + WebSockets to the LightRAG server.
server {
    listen 80;
    server_name _;
    client_max_body_size 100m;   # uploads

    root /usr/share/nginx/html;
    index index.html;

    # API (and the server's own routes) → the modified LightRAG server.
    location /api/ {
        proxy_pass http://api:9621/api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for the SAMpai realtime layer.
    location /api/sampai/ws {
        proxy_pass http://api:9621/api/sampai/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # Optional: the raw LightRAG WebUI / docs for debugging.
    location /webui/ { proxy_pass http://api:9621/webui/; proxy_set_header Host $host; }

    # SPA deep-link fallback (react-router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
